# ============================================================
# Nginx server block for Roundcube webmail
# Served at webmail.PLATFORM_DOMAIN_PLACEHOLDER
# Certbot will add SSL directives after running:
#   certbot --nginx -d webmail.PLATFORM_DOMAIN_PLACEHOLDER
# ============================================================

server {
    listen 80;
    server_name webmail.PLATFORM_DOMAIN_PLACEHOLDER;

    root /var/www/roundcube;
    index index.php;

    # PHP processing
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_intercept_errors on;
    }

    # Deny access to sensitive directories
    location ~ /\. { deny all; }
    location ~ ^/(config|temp|logs)/ { deny all; }
}
