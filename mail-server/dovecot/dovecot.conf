# ============================================================
# Dovecot Configuration
# IMAP server + LMTP delivery + SASL auth for Postfix
# Variables substituted by user-data.sh at deploy time
# ============================================================

protocols = imap lmtp
listen = *

# --- SSL ---
ssl = required
ssl_cert = </etc/letsencrypt/live/mail.PLATFORM_DOMAIN_PLACEHOLDER/fullchain.pem
ssl_key = </etc/letsencrypt/live/mail.PLATFORM_DOMAIN_PLACEHOLDER/privkey.pem
ssl_min_protocol = TLSv1.2

# --- Mail Storage ---
# Maildir format: /var/mail/vhosts/{domain}/{user}/Maildir/
# %d = domain part, %n = local part of email
mail_location = maildir:/var/mail/vhosts/%d/%n/Maildir
mail_privileged_group = vmail
first_valid_uid = 5000
last_valid_uid = 5000

# --- Authentication ---
auth_mechanisms = plain login
disable_plaintext_auth = yes

# Authenticate against PostgreSQL
passdb {
  driver = sql
  args = /etc/dovecot/dovecot-sql.conf.ext
}

userdb {
  driver = sql
  args = /etc/dovecot/dovecot-sql.conf.ext
}

# --- LMTP Service ---
# Postfix delivers incoming mail here
service lmtp {
  unix_listener /var/spool/postfix/private/dovecot-lmtp {
    group = postfix
    mode = 0600
    user = postfix
  }
}

# --- SASL Auth Service ---
# Postfix authenticates SMTP submission users here
service auth {
  unix_listener /var/spool/postfix/private/auth {
    mode = 0660
    user = postfix
    group = postfix
  }
}

# --- IMAP Service ---
service imap-login {
  inet_listener imap {
    port = 0
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }
}

# --- Namespace ---
namespace inbox {
  inbox = yes
  separator = /

  mailbox Drafts {
    auto = subscribe
    special_use = \Drafts
  }
  mailbox Sent {
    auto = subscribe
    special_use = \Sent
  }
  mailbox Trash {
    auto = subscribe
    special_use = \Trash
  }
  mailbox Junk {
    auto = subscribe
    special_use = \Junk
  }
  mailbox Archive {
    auto = no
    special_use = \Archive
  }
}

# --- Quota Plugin ---
mail_plugins = $mail_plugins quota

plugin {
  quota = maildir:User quota
  quota_grace = 10%%
}

protocol imap {
  mail_plugins = $mail_plugins imap_quota
  mail_max_userip_connections = 20
  imap_idle_notify_interval = 2 mins
}

# --- Logging ---
log_path = /var/log/dovecot.log
info_log_path = /var/log/dovecot-info.log
